server.port=8080

spring.jpa.properties.org.hibernate.envers.default_schema=_AUDIT
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.format_sql=true
spring.application.name=Reports
spring.profiles.active=dev

# logging
logging.path=logs
logging.file=${logging.path}/reports.log
logging.pattern.file=%d{dd-MM-yyyy HH:mm:ss.SSS} [%thread] %-5level %logger{36}.%M - %msg%n
logging.pattern.console=%d{dd-MM-yyyy HH:mm:ss.SSS} %magenta([%thread]) %highlight(%-5level) %logger.%M - %msg%n

# token auth demo configuration
app.security.client-id=report-client
app.security.client-secret=report-secret
app.security.api-token=reports-api-token-123
app.security.header-name=Authorization
